<?xml version="1.0" encoding="UTF-8"?>
<!-- CAR STICKER REAR: Vinyl sticker for vehicle rear -->
<!-- Recommended: 70cm x 18cm or 80cm x 20cm die-cut -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 500" width="2000" height="500">
  <defs>
    <linearGradient id="cs_flameGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E8312A"/>
      <stop offset="60%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
    <linearGradient id="cs_navyGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1F3460"/>
      <stop offset="100%" stop-color="#12213D"/>
    </linearGradient>
    <linearGradient id="cs_trans" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8102E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F47920" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- White sticker background with rounded corners for die-cut -->
  <rect width="2000" height="500" rx="25" ry="25" fill="#0C0C0F"/>
  <!-- Subtle border -->
  <rect width="2000" height="500" rx="25" ry="25" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Surprice icon -->
  <g transform="translate(50, 70) scale(0.75)">
    <path d="M195,15 C225,5 268,0 292,28 C316,56 298,95 260,118 C238,132 205,140 183,155 C165,167 158,180 165,192 L125,168 C112,142 130,118 160,98 C190,78 222,64 242,48 C262,32 255,14 232,12 Z" fill="url(#cs_flameGrad)"/>
    <path d="M215,35 C235,26 262,24 274,40 C286,56 274,82 252,98 L240,90 C256,78 264,60 256,46 C248,36 230,34 215,39 Z" fill="white" opacity="0.45"/>
    <path d="M165,192 C142,210 108,232 80,260 C52,288 58,322 86,340 C114,358 158,352 198,335 C238,318 266,290 278,268 C290,246 278,228 256,222 L268,200 C300,210 318,235 306,266 C294,298 262,330 218,352 C174,374 120,380 76,358 C32,336 20,296 48,262 C76,228 118,205 150,186 Z" fill="url(#cs_navyGrad)"/>
    <path d="M120,278 C138,258 170,232 198,218 L192,232 C170,244 148,264 134,288 C120,312 126,328 146,338 L132,348 C108,336 104,308 120,278 Z" fill="white" opacity="0.3"/>
  </g>

  <!-- Surprice text -->
  <text font-family="'Nunito', 'Varela Round', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="160" fill="#C8102E" x="310" y="305" letter-spacing="-3">Sur</text>
  <text font-family="'Nunito', 'Varela Round', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="160" fill="#FFFFFF" x="530" y="305" letter-spacing="-3">price</text>
  <text font-family="'Nunito', 'Varela Round', sans-serif" font-weight="600" font-size="36" fill="rgba(255,255,255,0.45)" x="320" y="375" letter-spacing="2">Empowering mobility</text>

  <!-- Transition separator -->
  <rect x="1095" y="100" width="3" height="300" rx="1.5" fill="url(#cs_trans)"/>

  <!-- VOYAGE -->
  <text font-family="'Nunito', 'Montserrat', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="140" fill="#F47920" x="1145" y="280" letter-spacing="3">VOYAGE</text>
  <text font-family="'Nunito', 'Montserrat', 'Arial Rounded MT Bold', sans-serif" font-weight="700" font-size="45" fill="rgba(255,255,255,0.55)" x="1150" y="345" letter-spacing="8">RENT</text>
  <line x1="1145" y1="362" x2="1380" y2="362" stroke="#F47920" stroke-width="2" opacity="0.4"/>
  <text font-family="'Nunito', 'Montserrat', sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.30)" x="1150" y="398" letter-spacing="5">CAR RENTAL PARTNER</text>
</svg>

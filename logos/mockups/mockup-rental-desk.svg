<?xml version="1.0" encoding="UTF-8"?>
<!-- MOCKUP: Airport / Rental Desk Counter Sign -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="d_flame" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E8312A"/>
      <stop offset="60%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
    <linearGradient id="d_navy" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1F3460"/>
      <stop offset="100%" stop-color="#12213D"/>
    </linearGradient>
    <linearGradient id="d_floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8C4C0"/>
      <stop offset="100%" stop-color="#A8A4A0"/>
    </linearGradient>
    <linearGradient id="d_trans" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8102E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F47920" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Room background -->
  <rect width="1200" height="800" fill="#E8E4E0"/>
  <!-- Floor -->
  <rect x="0" y="550" width="1200" height="250" fill="url(#d_floor)"/>
  <!-- Floor reflection line -->
  <line x1="0" y1="550" x2="1200" y2="550" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>

  <!-- Back wall with brand panel -->
  <rect x="150" y="50" width="900" height="480" rx="5" fill="#0C0C0F"/>

  <!-- Logo on wall panel -->
  <!-- Surprice icon -->
  <g transform="translate(230, 140) scale(0.42)">
    <path d="M195,15 C225,5 268,0 292,28 C316,56 298,95 260,118 C238,132 205,140 183,155 C165,167 158,180 165,192 L125,168 C112,142 130,118 160,98 C190,78 222,64 242,48 C262,32 255,14 232,12 Z" fill="url(#d_flame)"/>
    <path d="M215,35 C235,26 262,24 274,40 C286,56 274,82 252,98 L240,90 C256,78 264,60 256,46 C248,36 230,34 215,39 Z" fill="white" opacity="0.4"/>
    <path d="M165,192 C142,210 108,232 80,260 C52,288 58,322 86,340 C114,358 158,352 198,335 C238,318 266,290 278,268 C290,246 278,228 256,222 L268,200 C300,210 318,235 306,266 C294,298 262,330 218,352 C174,374 120,380 76,358 C32,336 20,296 48,262 C76,228 118,205 150,186 Z" fill="url(#d_navy)"/>
    <path d="M120,278 C138,258 170,232 198,218 L192,232 C170,244 148,264 134,288 C120,312 126,328 146,338 L132,348 C108,336 104,308 120,278 Z" fill="white" opacity="0.25"/>
  </g>

  <!-- Surprice text on wall -->
  <text font-family="'Nunito', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="88" fill="#C8102E" x="340" y="295" letter-spacing="-2">Sur</text>
  <text font-family="'Nunito', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" x="470" y="295" letter-spacing="-2">price</text>
  <text font-family="'Nunito', sans-serif" font-weight="600" font-size="22" fill="rgba(255,255,255,0.45)" x="345" y="332" letter-spacing="2">Empowering mobility</text>

  <!-- Divider -->
  <rect x="722" y="175" width="2" height="180" rx="1" fill="url(#d_trans)"/>

  <!-- VOYAGE on wall -->
  <text font-family="'Nunito', 'Montserrat', sans-serif" font-weight="900" font-size="82" fill="#F47920" x="755" y="285" letter-spacing="2">VOYAGE</text>
  <text font-family="'Nunito', 'Montserrat', sans-serif" font-weight="700" font-size="26" fill="rgba(255,255,255,0.5)" x="758" y="320" letter-spacing="5">RENT</text>
  <line x1="755" y1="332" x2="890" y2="332" stroke="#F47920" stroke-width="1.5" opacity="0.35"/>

  <!-- Counter desk -->
  <rect x="200" y="480" width="800" height="80" rx="4" fill="#2A2A2E"/>
  <!-- Counter front face -->
  <rect x="200" y="520" width="800" height="80" rx="0 0 4 4" fill="#1E1E22"/>
  <!-- Counter top highlight -->
  <line x1="200" y1="480" x2="1000" y2="480" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Computer monitor on desk -->
  <rect x="520" y="420" width="160" height="60" rx="3" fill="#333"/>
  <rect x="525" y="423" width="150" height="50" rx="2" fill="#2196F3" opacity="0.3"/>
  <!-- Monitor stand -->
  <rect x="585" y="478" width="30" height="5" fill="#444"/>

  <!-- Label -->
  <rect x="20" y="745" width="350" height="35" rx="4" fill="rgba(0,0,0,0.7)"/>
  <text font-family="'Nunito', sans-serif" font-weight="600" font-size="14" fill="white" x="35" y="768" letter-spacing="1">MOCKUP: AIRPORT / RENTAL DESK SIGN</text>
</svg>

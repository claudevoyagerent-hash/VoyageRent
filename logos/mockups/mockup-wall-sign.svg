<?xml version="1.0" encoding="UTF-8"?>
<!-- MOCKUP: Interior Wall Sign — Office / Lobby -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <linearGradient id="w_flame" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#E8312A"/>
      <stop offset="60%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
    <linearGradient id="w_navy" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1F3460"/>
      <stop offset="100%" stop-color="#12213D"/>
    </linearGradient>
    <linearGradient id="w_div" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#C8102E" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#E05520" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#F47920" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Shadow for panel -->
    <filter id="panelShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Wall background (light concrete) -->
  <rect width="1000" height="800" fill="#E2DDD8"/>

  <!-- ====== WALL PANEL (Stacked vertical logo) ====== -->
  <rect x="200" y="80" width="600" height="640" rx="8" fill="#0C0C0F" filter="url(#panelShadow)"/>

  <!-- Surprice icon centered -->
  <g transform="translate(385, 115) scale(0.42)">
    <path d="M195,15 C225,5 268,0 292,28 C316,56 298,95 260,118 C238,132 205,140 183,155 C165,167 158,180 165,192 L125,168 C112,142 130,118 160,98 C190,78 222,64 242,48 C262,32 255,14 232,12 Z" fill="url(#w_flame)"/>
    <path d="M215,35 C235,26 262,24 274,40 C286,56 274,82 252,98 L240,90 C256,78 264,60 256,46 C248,36 230,34 215,39 Z" fill="white" opacity="0.4"/>
    <path d="M165,192 C142,210 108,232 80,260 C52,288 58,322 86,340 C114,358 158,352 198,335 C238,318 266,290 278,268 C290,246 278,228 256,222 L268,200 C300,210 318,235 306,266 C294,298 262,330 218,352 C174,374 120,380 76,358 C32,336 20,296 48,262 C76,228 118,205 150,186 Z" fill="url(#w_navy)"/>
    <path d="M120,278 C138,258 170,232 198,218 L192,232 C170,244 148,264 134,288 C120,312 126,328 146,338 L132,348 C108,336 104,308 120,278 Z" fill="white" opacity="0.25"/>
  </g>

  <!-- Surprice text -->
  <text font-family="'Nunito', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="82" fill="#C8102E" x="500" y="355" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#C8102E">Sur</tspan><tspan fill="#FFFFFF">price</tspan>
  </text>
  <text font-family="'Nunito', sans-serif" font-weight="600" font-size="20" fill="rgba(255,255,255,0.42)" x="500" y="390" text-anchor="middle" letter-spacing="1.5">Empowering mobility</text>

  <!-- Gradient divider -->
  <rect x="280" y="420" width="440" height="2" fill="url(#w_div)"/>

  <!-- VOYAGE -->
  <text font-family="'Nunito', 'Montserrat', sans-serif" font-weight="900" font-size="90" fill="#F47920" x="500" y="520" text-anchor="middle" letter-spacing="4">VOYAGE</text>
  <text font-family="'Nunito', 'Montserrat', sans-serif" font-weight="700" font-size="34" fill="rgba(255,255,255,0.50)" x="500" y="568" text-anchor="middle" letter-spacing="8">RENT</text>
  <line x1="410" y1="585" x2="590" y2="585" stroke="#F47920" stroke-width="1.5" opacity="0.35"/>
  <text font-family="'Nunito', 'Montserrat', sans-serif" font-weight="500" font-size="16" fill="rgba(255,255,255,0.28)" x="500" y="618" text-anchor="middle" letter-spacing="5">CAR RENTAL PARTNER</text>

  <!-- Standoff mounting dots (decorative) -->
  <circle cx="220" cy="100" r="5" fill="#888" opacity="0.4"/>
  <circle cx="780" cy="100" r="5" fill="#888" opacity="0.4"/>
  <circle cx="220" cy="700" r="5" fill="#888" opacity="0.4"/>
  <circle cx="780" cy="700" r="5" fill="#888" opacity="0.4"/>

  <!-- Label -->
  <rect x="20" y="750" width="320" height="35" rx="4" fill="rgba(0,0,0,0.7)"/>
  <text font-family="'Nunito', sans-serif" font-weight="600" font-size="14" fill="white" x="35" y="773" letter-spacing="1">MOCKUP: INTERIOR WALL SIGN</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200">
  <!-- === SURPRICE TEXT ONLY === -->
  <g transform="translate(20, 55)">
    <!-- "Sur" in red -->
    <text font-family="'Nunito', 'Rounded Mplus 1c', 'Varela Round', Arial Rounded MT Bold, Arial, sans-serif" font-weight="800" font-size="100" fill="#C8102E" letter-spacing="-2">
      <tspan>Sur</tspan>
    </text>
    <!-- "price" in navy -->
    <text font-family="'Nunito', 'Rounded Mplus 1c', 'Varela Round', Arial Rounded MT Bold, Arial, sans-serif" font-weight="800" font-size="100" fill="#1B2A4A" letter-spacing="-2" x="155">
      <tspan>price</tspan>
    </text>
  </g>

  <!-- "Empowering mobility" tagline -->
  <text font-family="'Nunito', 'Rounded Mplus 1c', 'Varela Round', Arial Rounded MT Bold, Arial, sans-serif" font-weight="700" font-size="30" fill="#1B2A4A" x="30" y="180" letter-spacing="1">Empowering mobility</text>

  <!-- === VERTICAL DIVIDER === -->
  <line x1="510" y1="30" x2="510" y2="185" stroke="#C8102E" stroke-width="2.5" opacity="0.5"/>

  <!-- === VOYAGE RENT === -->
  <g transform="translate(540, 55)">
    <text font-family="'Nunito', 'Rounded Mplus 1c', 'Varela Round', Arial Rounded MT Bold, Arial, sans-serif" font-weight="800" font-size="80" fill="#1B2A4A" letter-spacing="-1">
      <tspan>Voyage</tspan>
    </text>
  </g>
  <g transform="translate(540, 140)">
    <text font-family="'Nunito', 'Rounded Mplus 1c', 'Varela Round', Arial Rounded MT Bold, Arial, sans-serif" font-weight="800" font-size="80" fill="#C8102E" letter-spacing="-1">
      <tspan>Rent</tspan>
    </text>
  </g>

  <text font-family="'Nunito', 'Rounded Mplus 1c', 'Varela Round', Arial Rounded MT Bold, Arial, sans-serif" font-weight="600" font-size="20" fill="#1B2A4A" x="545" y="180" letter-spacing="2" opacity="0.7">CAR RENTAL</text>
</svg>
